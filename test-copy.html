<!DOCTYPE html>
<html>
<head>
  <script src="./demo/build/index.js"></script>
</head>
<body>
  <h2>Test copyWithKey</h2>
  <p>copyWithKey=false (default) - should copy only "John":</p>
  <andypf-json-viewer id="test1" data='{"name": "John"}' show-copy="true"></andypf-json-viewer>

  <br><br>
  <p>copyWithKey=true - should copy "name": "John":</p>
  <andypf-json-viewer id="test2" data='{"name": "John"}' show-copy="true" copy-with-key="true"></andypf-json-viewer>

  <script>
    console.log('Test1 options:', document.getElementById('test1').options);
    console.log('Test2 options:', document.getElementById('test2').options);
  </script>
</body>
</html>
